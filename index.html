<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장보기 목록</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #161B27;
      --card:       #1E2535;
      --card-hover: #242D40;
      --border:     rgba(255,255,255,0.07);
      --chalk:      #EDE8D8;
      --chalk-dim:  #7A7562;
      --gold:       #F5C518;
      --gold-glow:  rgba(245, 197, 24, 0.18);
      --green:      #5EBF72;
      --green-glow: rgba(94, 191, 114, 0.15);
      --red:        #E05C55;
      --red-glow:   rgba(224, 92, 85, 0.12);
      --font-hand:  'Caveat', cursive;
      --font-mono:  'Space Mono', monospace;
    }

    /* ── Grain texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 50% at 15% 10%,  rgba(245,197,24,0.05)  0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 90%,  rgba(94,191,114,0.05)  0%, transparent 70%);
      font-family: var(--font-mono);
      color: var(--chalk);
    }

    /* ── Layout ── */
    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.5s ease both;
    }

    .header-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px;
      height: 68px;
      background: var(--gold-glow);
      border: 1.5px solid rgba(245,197,24,0.22);
      border-radius: 20px;
      font-size: 2rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 32px rgba(245,197,24,0.12);
    }

    .header h1 {
      font-family: var(--font-hand);
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 40px rgba(245,197,24,0.25);
      letter-spacing: -0.01em;
    }

    .header-sub {
      font-size: 0.62rem;
      color: var(--chalk-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      animation: fadeDown 0.5s 0.08s ease both;
    }

    .stats-text {
      font-size: 0.7rem;
      color: var(--chalk-dim);
      letter-spacing: 0.06em;
    }

    .stats-text em {
      font-style: normal;
      color: var(--gold);
      font-weight: 700;
    }

    .clear-btn {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--red);
      background: none;
      border: 1px solid rgba(224,92,85,0.25);
      border-radius: 7px;
      padding: 0.28rem 0.65rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .clear-btn:hover:not(:disabled) {
      background: var(--red-glow);
      border-color: var(--red);
    }

    .clear-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      margin-bottom: 1.25rem;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
      animation: fadeDown 0.5s 0.12s ease both;
    }

    .progress-wrap.visible { opacity: 1; }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--green) 100%);
      transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      animation: fadeDown 0.5s 0.16s ease both;
    }

    .item-input {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      font-family: var(--font-hand);
      font-size: 1.4rem;
      color: var(--chalk);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .item-input::placeholder { color: var(--chalk-dim); }

    .item-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .add-btn {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 1.6rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 4px 18px rgba(245,197,24,0.28);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .add-btn:hover {
      background: #ffd633;
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(245,197,24,0.42);
    }

    .add-btn:active { transform: scale(0.94); }

    /* ── List ── */
    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      animation: fadeDown 0.5s 0.2s ease both;
    }

    /* ── Item ── */
    .item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.85rem 0.9rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: background 0.18s, border-color 0.18s, transform 0.18s, opacity 0.18s;
      position: relative;
      overflow: hidden;
    }

    .item::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .item:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.12);
    }

    .item:hover::after { opacity: 1; }

    .item.checked { opacity: 0.5; }

    .item.checked::after {
      background: var(--green);
      opacity: 1;
    }

    /* slide-in on add */
    .item.entering {
      animation: slideIn 0.28s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* slide-out on delete */
    .item.leaving {
      animation: slideOut 0.26s ease-in forwards;
    }

    /* ── Checkbox ── */
    .checkbox {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      position: relative;
    }

    .checkbox:hover {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .item.checked .checkbox {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-glow);
    }

    .checkmark {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      opacity: 0;
      transform: scale(0.4) rotate(-20deg);
      transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .item.checked .checkmark {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* ── Item text ── */
    .item-text {
      flex: 1;
      font-family: var(--font-hand);
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--chalk);
      word-break: break-word;
      transition: color 0.25s, text-decoration-color 0.25s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      text-decoration-color: var(--green);
      text-decoration-thickness: 2px;
      color: var(--chalk-dim);
    }

    /* ── Delete button ── */
    .del-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      border-radius: 7px;
      color: var(--chalk-dim);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }

    .item:hover .del-btn { opacity: 1; }

    .del-btn:hover {
      color: var(--red);
      background: var(--red-glow);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3.5rem 1rem;
      display: none;
    }

    .empty-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 1rem;
      opacity: 0.45;
    }

    .empty p {
      font-family: var(--font-hand);
      font-size: 1.5rem;
      color: var(--chalk-dim);
    }

    .empty small {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--chalk-dim);
      opacity: 0.55;
      margin-top: 0.4rem;
    }

    /* ── All done banner ── */
    .done-banner {
      display: none;
      text-align: center;
      padding: 1rem;
      background: var(--green-glow);
      border: 1px solid rgba(94,191,114,0.2);
      border-radius: 12px;
      margin-top: 1rem;
      font-family: var(--font-hand);
      font-size: 1.4rem;
      color: var(--green);
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-18px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(18px); max-height: 0; padding: 0; margin: 0; border-width: 0; }
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-icon">🛒</div>
    <h1>장보기 목록</h1>
    <p class="header-sub">Shopping List</p>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <span class="stats-text" id="stats-text">아이템 없음</span>
    <button class="clear-btn" id="clear-btn" disabled>완료 항목 삭제</button>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Input -->
  <div class="input-row">
    <input
      type="text"
      class="item-input"
      id="item-input"
      placeholder="사과, 우유, 계란..."
      autocomplete="off"
      spellcheck="false"
    >
    <button class="add-btn" id="add-btn" title="추가 (Enter)">+</button>
  </div>

  <!-- List -->
  <ul class="list" id="list"></ul>

  <!-- Empty state -->
  <div class="empty" id="empty">
    <span class="empty-icon">📋</span>
    <p>장볼 것을 입력해보세요</p>
    <small>위 입력칸에 항목을 추가하세요</small>
  </div>

  <!-- All done -->
  <div class="done-banner" id="done-banner">🎉 장보기 완료!</div>

</div>

<script>
  const STORAGE_KEY = 'vibe-shopping-list';

  let items = load();

  const listEl     = document.getElementById('list');
  const inputEl    = document.getElementById('item-input');
  const addBtnEl   = document.getElementById('add-btn');
  const clearBtnEl = document.getElementById('clear-btn');
  const statsEl    = document.getElementById('stats-text');
  const emptyEl    = document.getElementById('empty');
  const doneBanner = document.getElementById('done-banner');
  const progressW  = document.getElementById('progress-wrap');
  const progressF  = document.getElementById('progress-fill');

  /* ── Storage ── */
  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  /* ── Render ── */
  function render() {
    const total   = items.length;
    const checked = items.filter(i => i.done).length;

    /* empty / done banner */
    emptyEl.style.display  = total === 0 ? 'block' : 'none';
    doneBanner.style.display = (total > 0 && checked === total) ? 'block' : 'none';

    /* stats */
    if (total === 0) {
      statsEl.innerHTML = '아이템 없음';
    } else {
      statsEl.innerHTML = `<em>${checked}</em> / ${total} 완료`;
    }

    /* clear btn */
    clearBtnEl.disabled = checked === 0;

    /* progress */
    if (total > 0) {
      progressW.classList.add('visible');
      progressF.style.width = `${(checked / total) * 100}%`;
    } else {
      progressW.classList.remove('visible');
      progressF.style.width = '0%';
    }

    /* list items */
    listEl.innerHTML = '';
    items.forEach((item, idx) => {
      const li = document.createElement('li');
      li.className = 'item' + (item.done ? ' checked' : '');
      li.dataset.idx = idx;
      li.innerHTML = `
        <div class="checkbox" data-action="toggle" data-idx="${idx}">
          <span class="checkmark">✓</span>
        </div>
        <span class="item-text">${esc(item.text)}</span>
        <button class="del-btn" data-action="delete" data-idx="${idx}" title="삭제">✕</button>
      `;
      listEl.appendChild(li);
    });
  }

  /* ── Actions ── */
  function addItem() {
    const text = inputEl.value.trim();
    if (!text) { inputEl.focus(); return; }

    items.unshift({ id: Date.now(), text, done: false });
    save();

    inputEl.value = '';
    inputEl.focus();

    render();

    /* play enter animation only on the new first item */
    const first = listEl.firstElementChild;
    if (first) {
      first.classList.add('entering');
      first.addEventListener('animationend', () => first.classList.remove('entering'), { once: true });
    }
  }

  function toggleItem(idx) {
    items[idx].done = !items[idx].done;
    save();
    render();
  }

  function deleteItem(idx) {
    const li = listEl.querySelector(`[data-idx="${idx}"]`);
    if (!li) return;

    li.classList.add('leaving');
    li.addEventListener('animationend', () => {
      items.splice(idx, 1);
      save();
      render();
    }, { once: true });
  }

  function clearChecked() {
    const leavingEls = [...listEl.querySelectorAll('.item.checked')];
    if (!leavingEls.length) return;

    let done = 0;
    leavingEls.forEach(el => {
      el.classList.add('leaving');
      el.addEventListener('animationend', () => {
        done++;
        if (done === leavingEls.length) {
          items = items.filter(i => !i.done);
          save();
          render();
        }
      }, { once: true });
    });
  }

  /* ── Event delegation ── */
  listEl.addEventListener('click', e => {
    const action = e.target.closest('[data-action]');
    if (!action) return;
    const idx = parseInt(action.dataset.idx, 10);
    if (isNaN(idx)) return;
    if (action.dataset.action === 'toggle') toggleItem(idx);
    if (action.dataset.action === 'delete') deleteItem(idx);
  });

  addBtnEl.addEventListener('click', addItem);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  clearBtnEl.addEventListener('click', clearChecked);

  /* ── Escape HTML ── */
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Init ── */
  render();
  inputEl.focus();
</script>
</body>
</html>
